<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girdhari Group Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --main-title-color: #e67e22; 
            --btn-backup: #10b981; 
            --btn-restore: #3b82f6; 
            --btn-pdf: #1f2937; 
            --value-collected: #10b981; 
            --value-expenses: #ef4444; 
            --value-balance: #e67e22; 
            --border-color: #e5e7eb;
            --text-light: #6b7280;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #111827;
            padding: 15px;
            line-height: 1.5;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* --- Header Section --- */
        .top-card {
            background-color: var(--container-bg);
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; background-color: #e5e7eb; }
        .group-name { color: var(--main-title-color); font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }

        /* --- Action Buttons Section --- */
        .action-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; border-radius: 8px; border: none; color: #ffffff; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-backup { background-color: var(--btn-backup); }
        .btn-restore { background-color: var(--btn-restore); }
        .btn-pdf { background-color: var(--btn-pdf); }
        .btn-icon { font-size: 1.2rem; margin-bottom: 6px; }

        /* --- Financial Cards Section --- */
        .financial-card { background-color: #ffffff; padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); text-align: center; margin-bottom: 15px; }
        .card-label { color: var(--text-light); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card-value { font-size: 32px; font-weight: bold; }
        .value-collected { color: var(--value-collected); }
        .value-expenses { color: var(--value-expenses); }
        .value-balance { color: var(--value-balance); }

        /* --- Forms Section --- */
        .form-card { background-color: #ffffff; padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        
        .text-success { color: var(--value-collected); }
        .text-danger { color: var(--value-expenses); }
        .text-history { color: var(--text-light); }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 4px; color: var(--text-light); font-weight: 500;}
        input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 16px; }
        input:focus { outline: none; border-color: var(--main-title-color); }

        .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-add { background-color: var(--value-collected); }
        .btn-exp { background-color: var(--value-expenses); }

        /* --- Lists Section --- */
        ul { list-style: none; margin-top: 16px; max-height: 300px; overflow-y: auto; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9fafb; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-weight: 600; font-size: 15px;}
        .item-date { font-size: 12px; color: var(--text-light); }
        .item-amount { font-weight: 700; font-size: 16px; margin-right: 15px;}
        
        .delete-btn { background: #fee2e2; color: var(--value-expenses); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        
        /* History Specific Styles */
        .history-card { background-color: #f3f4f6; border: 1px dashed var(--text-light); }
        .restore-btn { background: #d1fae5; color: var(--value-collected); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 5px;}
        .clear-history-btn { background: var(--text-light); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;}
        #historyList li { background: #e5e7eb; opacity: 0.8; }

        #pdfContent { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-card">
        <img src="logo.png" alt="Logo" class="logo-img" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
        <h1 class="group-name">Girdhari Group</h1>
        
        <div class="action-buttons">
            <button class="btn btn-backup" onclick="backupData()">
                <i class="fas fa-save btn-icon"></i> Backup
            </button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
            <button class="btn btn-restore" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-folder-open btn-icon"></i> Restore
            </button>
            <button class="btn btn-pdf" onclick="generatePDF()">
                <i class="fas fa-file-pdf btn-icon"></i> PDF Report
            </button>
        </div>
    </div>

    <div class="financial-card">
        <div class="card-label">Total Collected</div>
        <div class="card-value value-collected" id="totalCollected">₹ 0</div>
    </div>
    <div class="financial-card">
        <div class="card-label">Total Expenses</div>
        <div class="card-value value-expenses" id="totalExpenses">₹ 0</div>
    </div>
    <div class="financial-card">
        <div class="card-label">Current Balance</div>
        <div class="card-value value-balance" id="currentBalance">₹ 0</div>
    </div>

    <div class="form-card">
        <h2 class="section-title text-success">Add Contribution</h2>
        <div class="form-group"><label>Date</label><input type="date" id="fundDate"></div>
        <div class="form-group"><label>Member Name</label><input type="text" id="memberName" placeholder="Enter name"></div>
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="memberAmount" placeholder="0"></div>
        <button class="submit-btn btn-add" onclick="addRecord('fund')">Add Fund</button>
        <ul id="contributionList"></ul>
    </div>

    <div class="form-card">
        <h2 class="section-title text-danger">Add Expense</h2>
        <div class="form-group"><label>Date</label><input type="date" id="expDate"></div>
        <div class="form-group"><label>Expense Detail</label><input type="text" id="expenseName" placeholder="What was purchased?"></div>
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="expenseAmount" placeholder="0"></div>
        <button class="submit-btn btn-exp" onclick="addRecord('exp')">Deduct Expense</button>
        <ul id="expenseList"></ul>
    </div>

    <div class="form-card history-card">
        <h2 class="section-title text-history">
            Deleted History 
            <button class="clear-history-btn" onclick="clearAllHistory()">Empty Bin</button>
        </h2>
        <ul id="historyList"></ul>
    </div>
</div>

<div id="pdfContent"></div>

<script>
    // 1. Setup Dates
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fundDate').value = today;
    document.getElementById('expDate').value = today;

    // 2. Load Data from Browser Storage
    let contributions = JSON.parse(localStorage.getItem('girdhari_ui_funds')) || [];
    let expenses = JSON.parse(localStorage.getItem('girdhari_ui_expenses')) || [];
    let historyLog = JSON.parse(localStorage.getItem('girdhari_ui_history')) || []; // The new history array
    
    let totalFund = 0;
    let totalExp = 0;

    function formatDate(dateString) {
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        return new Date(dateString).toLocaleDateString('en-IN', options);
    }

    // 3. Update the UI
    function updateUI() {
        totalFund = 0;
        totalExp = 0;
        
        const contList = document.getElementById('contributionList');
        const expList = document.getElementById('expenseList');
        const histList = document.getElementById('historyList');
        
        contList.innerHTML = '';
        expList.innerHTML = '';
        histList.innerHTML = '';

        // Render Contributions
        contributions.forEach((item, index) => {
            totalFund += item.amount;
            contList.innerHTML += `
                <li>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-date">${formatDate(item.date)}</span>
                    </div>
                    <div>
                        <span class="item-amount text-success">₹${item.amount.toLocaleString('en-IN')}</span>
                        <button class="delete-btn" onclick="moveToHistory('fund', ${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </li>`;
        });

        // Render Expenses
        expenses.forEach((item, index) => {
            totalExp += item.amount;
            expList.innerHTML += `
                <li>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-date">${formatDate(item.date)}</span>
                    </div>
                    <div>
                        <span class="item-amount text-danger">₹${item.amount.toLocaleString('en-IN')}</span>
                        <button class="delete-btn" onclick="moveToHistory('exp', ${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </li>`;
        });

        // Render History Log
        if(historyLog.length === 0) {
            histList.innerHTML = `<p style="text-align:center; color:#9ca3af; font-size:14px; margin-top:10px;">Trash is empty.</p>`;
        } else {
            historyLog.forEach((item, index) => {
                const typeColor = item.originalType === 'fund' ? 'text-success' : 'text-danger';
                const typeSign = item.originalType === 'fund' ? '+' : '-';
                
                histList.innerHTML += `
                    <li>
                        <div class="item-info">
                            <span class="item-name" style="text-decoration: line-through;">${item.name}</span>
                            <span class="item-date">Orig: ${formatDate(item.date)}</span>
                        </div>
                        <div>
                            <span class="item-amount ${typeColor}">${typeSign}₹${item.amount.toLocaleString('en-IN')}</span>
                            <button class="restore-btn" onclick="restoreFromHistory(${index})" title="Restore"><i class="fas fa-undo"></i></button>
                            <button class="delete-btn" onclick="permanentDelete(${index})" title="Delete Forever"><i class="fas fa-times"></i></button>
                        </div>
                    </li>`;
            });
        }

        // Update Dashboard Numbers
        document.getElementById('totalCollected').innerText = `₹ ${totalFund.toLocaleString('en-IN')}`;
        document.getElementById('totalExpenses').innerText = `₹ ${totalExp.toLocaleString('en-IN')}`;
        document.getElementById('currentBalance').innerText = `₹ ${(totalFund - totalExp).toLocaleString('en-IN')}`;

        // Save to browser memory
        localStorage.setItem('girdhari_ui_funds', JSON.stringify(contributions));
        localStorage.setItem('girdhari_ui_expenses', JSON.stringify(expenses));
        localStorage.setItem('girdhari_ui_history', JSON.stringify(historyLog));
    }

    function addRecord(type) {
        const isFund = type === 'fund';
        const dateInput = document.getElementById(isFund ? 'fundDate' : 'expDate').value;
        const nameInput = document.getElementById(isFund ? 'memberName' : 'expenseName');
        const amountInput = document.getElementById(isFund ? 'memberAmount' : 'expenseAmount');
        
        const name = nameInput.value.trim();
        const amount = parseFloat(amountInput.value);

        if (name && amount > 0 && dateInput) {
            const record = { date: dateInput, name, amount };
            if (isFund) contributions.push(record);
            else expenses.push(record);

            nameInput.value = '';
            amountInput.value = '';
            updateUI(); 
        } else {
            alert("Please fill in the Date, Name, and Amount!");
        }
    }

    // NEW: Moves items to history instead of deleting them instantly
    function moveToHistory(type, index) {
        if (confirm("Move this record to the trash bin?")) {
            let deletedItem;
            if (type === 'fund') {
                deletedItem = contributions.splice(index, 1)[0];
                deletedItem.originalType = 'fund'; // Remember where it came from
            } else {
                deletedItem = expenses.splice(index, 1)[0];
                deletedItem.originalType = 'exp';
            }
            // Add it to the top of the history list
            historyLog.unshift(deletedItem); 
            updateUI();
        }
    }

    // NEW: Put an item back to its original list
    function restoreFromHistory(index) {
        const item = historyLog.splice(index, 1)[0]; // Remove from history
        
        // Clean it up and put it back
        const restoredRecord = { date: item.date, name: item.name, amount: item.amount };
        
        if (item.originalType === 'fund') {
            contributions.push(restoredRecord);
        } else {
            expenses.push(restoredRecord);
        }
        updateUI();
    }

    // NEW: Delete a single item forever
    function permanentDelete(index) {
        if (confirm("Permanently delete this record? This cannot be undone.")) {
            historyLog.splice(index, 1);
            updateUI();
        }
    }

    // NEW: Empty the whole trash bin
    function clearAllHistory() {
        if (historyLog.length > 0 && confirm("Empty the trash? All deleted items will be gone forever.")) {
            historyLog = [];
            updateUI();
        }
    }

    function backupData() {
        if (contributions.length === 0 && expenses.length === 0) {
            alert("No data to backup yet!");
            return;
        }
        // Backup includes history just in case!
        const backup = { funds: contributions, expenses: expenses, history: historyLog };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "Girdhari_Backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.funds && data.expenses) {
                    contributions = data.funds;
                    expenses = data.expenses;
                    if(data.history) historyLog = data.history;
                    updateUI();
                    alert("✅ Data restored successfully!");
                } else {
                    alert("❌ Invalid backup file format.");
                }
            } catch (error) {
                alert("❌ Error reading backup file.");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    });

    function generatePDF() {
        if (contributions.length === 0 && expenses.length === 0) {
            alert("No records to print!");
            return;
        }
        
        const pdfContainer = document.getElementById('pdfContent');
        pdfContainer.style.display = 'block'; 
        pdfContainer.style.padding = '30px';
        pdfContainer.style.fontFamily = "Arial, sans-serif";
        
        let pdfHTML = `
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color: #d35400; margin:0; font-size: 28px;">GIRDHARI GROUP FUND</h1>
                <p style="color: #666; margin-top:5px;">Report Generated: ${formatDate(new Date())}</p>
            </div>
            
            <div style="display: flex; justify-content: space-between; background: #f3f4f6; padding: 15px; border-radius: 8px; margin-bottom: 30px;">
                <div style="text-align:center;"><strong>Total Collected</strong><br><span style="color:#10b981; font-size:20px;">₹${totalFund.toLocaleString('en-IN')}</span></div>
                <div style="text-align:center;"><strong>Total Expenses</strong><br><span style="color:#ef4444; font-size:20px;">₹${totalExp.toLocaleString('en-IN')}</span></div>
                <div style="text-align:center;"><strong>Final Balance</strong><br><span style="color:#e67e22; font-size:20px;">₹${(totalFund - totalExp).toLocaleString('en-IN')}</span></div>
            </div>

            <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 14px;">
                <thead>
                    <tr style="background: #10b981; color: white;">
                        <th colspan="3" style="padding: 10px; text-align: left;">Contributions Log</th>
                    </tr>
                    <tr style="background: #e5e7eb; color: #333;">
                        <th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Date</th>
                        <th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Member Name</th>
                        <th style="padding: 8px; text-align: right; border: 1px solid #ccc;">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    ${contributions.map(c => `
                    <tr>
                        <td style="padding: 8px; border: 1px solid #ccc;">${formatDate(c.date)}</td>
                        <td style="padding: 8px; border: 1px solid #ccc;">${c.name}</td>
                        <td style="padding: 8px; text-align: right; border: 1px solid #ccc;">₹${c.amount.toLocaleString('en-IN')}</td>
                    </tr>`).join('')}
                </tbody>
            </table>

            <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                <thead>
                    <tr style="background: #ef4444; color: white;">
                        <th colspan="3" style="padding: 10px; text-align: left;">Expenses Log</th>
                    </tr>
                    <tr style="background: #e5e7eb; color: #333;">
                        <th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Date</th>
                        <th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Expense Detail</th>
                        <th style="padding: 8px; text-align: right; border: 1px solid #ccc;">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    ${expenses.map(e => `
                    <tr>
                        <td style="padding: 8px; border: 1px solid #ccc;">${formatDate(e.date)}</td>
                        <td style="padding: 8px; border: 1px solid #ccc;">${e.name}</td>
                        <td style="padding: 8px; text-align: right; border: 1px solid #ccc;">₹${e.amount.toLocaleString('en-IN')}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        `;

        // Notice: We don't include the "History" table in the PDF, because it's just a trash bin!

        pdfContainer.innerHTML = pdfHTML;

        const opt = {
            margin:       0.5,
            filename:     'Girdhari_Group_Report.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(pdfContainer).save().then(() => {
            pdfContainer.style.display = 'none';
        });
    }

    updateUI();
</script>

</body>
</html>
