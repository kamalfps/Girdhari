<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girdhari Group Dashboard</title>

    <link rel="icon" href="logo1.jpg" type="image/jpeg">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --main-title-color: #e67e22; 
            --btn-pdf: #1f2937; 
            --value-collected: #10b981; 
            --value-expenses: #ef4444; 
            --value-balance: #e67e22; 
            --border-color: #e5e7eb;
            --text-light: #6b7280;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #111827;
            padding: 15px;
            line-height: 1.5;
        }

        /* --- LOGIN SCREEN --- */
        #loginScreen {
            max-width: 400px; margin: 100px auto; background: white; padding: 30px; 
            border-radius: var(--border-radius); box-shadow: var(--shadow); text-align: center;
        }
        #loginScreen h2 { color: var(--main-title-color); margin-bottom: 20px; }
        #pinInput { width: 100%; padding: 12px; font-size: 18px; text-align: center; border: 2px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; letter-spacing: 5px;}
        .login-btn { width: 100%; padding: 12px; background: var(--main-title-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #loginError { color: var(--value-expenses); font-size: 14px; display: none; margin-top: 10px; }
        
        #mainDashboard { display: none; max-width: 600px; margin: 0 auto; }

        /* --- Header Section --- */
        .top-card { background-color: var(--container-bg); padding: 24px; border-radius: var(--border-radius); box-shadow: var(--shadow); text-align: center; margin-bottom: 20px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; background-color: #e5e7eb; }
        .group-name { color: var(--main-title-color); font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; border-radius: 8px; border: none; color: #ffffff; font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.2s; background-color: var(--btn-pdf); width: 100%; }
        .btn:hover { opacity: 0.9; }
        .btn-icon { font-size: 1.2rem; margin-right: 8px; }

        /* --- Custom Checkbox Styles for PDF Options --- */
        .pdf-options { background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); text-align: left; }
        .pdf-options-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text-light); }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; font-size: 14px; }
        .checkbox-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .checkbox-group input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--main-title-color); }

        /* --- Financial Cards Section --- */
        .financial-card { background-color: #ffffff; padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); text-align: center; margin-bottom: 15px; }
        .card-label { color: var(--text-light); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card-value { font-size: 32px; font-weight: bold; }
        .value-collected { color: var(--value-collected); }
        .value-expenses { color: var(--value-expenses); }
        .value-balance { color: var(--value-balance); }

        /* --- Forms Section --- */
        .form-card { background-color: #ffffff; padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        .text-success { color: var(--value-collected); }
        .text-danger { color: var(--value-expenses); }
        .text-history { color: var(--text-light); }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 4px; color: var(--text-light); font-weight: 500;}
        input[type="date"], input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 16px; }
        input:focus { outline: none; border-color: var(--main-title-color); }

        .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-add { background-color: var(--value-collected); }
        .btn-exp { background-color: var(--value-expenses); }

        /* --- Lists Section --- */
        ul { list-style: none; margin-top: 16px; max-height: 300px; overflow-y: auto; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9fafb; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-weight: 600; font-size: 15px;}
        .item-date { font-size: 12px; color: var(--text-light); }
        .item-amount { font-weight: 700; font-size: 16px; margin-right: 15px;}
        .delete-btn { background: #fee2e2; color: var(--value-expenses); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* --- History Styles --- */
        .history-card { background-color: #f3f4f6; border: 1px dashed var(--text-light); }
        .restore-btn { background: #d1fae5; color: var(--value-collected); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 5px;}
        .clear-history-btn { background: var(--text-light); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;}
        #historyList li { background: #e5e7eb; opacity: 0.8; }

        #pdfContent { display: none; }
    </style>
</head>
<body>

<div id="loginScreen">
    <img src="logo1.jpg" alt="Logo" style="width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px;" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
    <h2>Girdhari Group Security</h2>
    <p style="color: #6b7280; font-size: 14px; margin-bottom: 15px;">Please enter the PIN to view funds.</p>
    <input type="password" id="pinInput" placeholder="Enter PIN" inputmode="numeric">
    <button class="login-btn" onclick="checkPin()">Unlock Dashboard</button>
    <p id="loginError">Incorrect PIN. Try again.</p>
</div>

<div id="mainDashboard">
    <div class="top-card">
        <img src="logo1.jpg" alt="Logo" class="logo-img" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
        <h1 class="group-name">Girdhari Group</h1>
        
        <div class="pdf-options">
            <p class="pdf-options-title">Select items to include in PDF:</p>
            <div class="checkbox-group">
                <label><input type="checkbox" id="pdfSummary" checked> Summary Balance</label>
                <label><input type="checkbox" id="pdfFunds" checked> Contributions</label>
                <label><input type="checkbox" id="pdfExps" checked> Expenses</label>
            </div>
        </div>

        <button class="btn" id="pdfBtn">
            <i class="fas fa-file-pdf btn-icon"></i> Download PDF Report
        </button>
    </div>

    <div class="financial-card">
        <div class="card-label">Total Collected</div>
        <div class="card-value value-collected" id="totalCollected">₹ 0</div>
    </div>
    <div class="financial-card">
        <div class="card-label">Total Expenses</div>
        <div class="card-value value-expenses" id="totalExpenses">₹ 0</div>
    </div>
    <div class="financial-card">
        <div class="card-label">Current Balance</div>
        <div class="card-value value-balance" id="currentBalance">₹ 0</div>
    </div>

    <div class="form-card">
        <h2 class="section-title text-success">Add Contribution</h2>
        <div class="form-group"><label>Date</label><input type="date" id="fundDate"></div>
        <div class="form-group"><label>Member Name</label><input type="text" id="memberName" placeholder="Enter name"></div>
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="memberAmount" placeholder="0"></div>
        <button class="submit-btn btn-add" id="addFundBtn">Add Fund</button>
        <ul id="contributionList"></ul>
    </div>

    <div class="form-card">
        <h2 class="section-title text-danger">Add Expense</h2>
        <div class="form-group"><label>Date</label><input type="date" id="expDate"></div>
        <div class="form-group"><label>Expense Detail</label><input type="text" id="expenseName" placeholder="What was purchased?"></div>
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="expenseAmount" placeholder="0"></div>
        <button class="submit-btn btn-exp" id="addExpBtn">Deduct Expense</button>
        <ul id="expenseList"></ul>
    </div>

    <div class="form-card history-card">
        <h2 class="section-title text-history">
            Trash Bin 
            <button class="clear-history-btn" onclick="emptyTrash()">Empty Bin</button>
        </h2>
        <ul id="historyList"></ul>
    </div>
</div>

<div id="pdfContent"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // --- 1. PIN PROTECTION ---
    const SECRET_PIN = "1523";

    window.checkPin = function() {
        const enteredPin = document.getElementById('pinInput').value;
        if (enteredPin === SECRET_PIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            startRealtimeSync(); 
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('pinInput').value = '';
        }
    }

    document.getElementById('pinInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") window.checkPin();
    });

    // --- 2. FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCVPQ_rLAh-KIS4XA8sw-5tkS6LWXipTgE",
        authDomain: "girdhari-group.firebaseapp.com",
        projectId: "girdhari-group",
        storageBucket: "girdhari-group.firebasestorage.app",
        messagingSenderId: "799328897939",
        appId: "1:799328897939:web:a30684eb3a3f47aad27666"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 3. FIX DATE TIMEZONE ---
    const d = new Date();
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const localToday = `${year}-${month}-${day}`;
    
    document.getElementById('fundDate').value = localToday;
    document.getElementById('expDate').value = localToday;

    let contributions = [];
    let expenses = [];

    function formatDate(dateString) {
        if(!dateString) return '';
        const parts = dateString.split('-');
        if(parts.length === 3) {
            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            return dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        return new Date(dateString).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // --- 4. REALTIME SYNC ---
    function startRealtimeSync() {
        // Fetch Funds
        const fundsQuery = query(collection(db, "funds"), orderBy("date", "desc"));
        onSnapshot(fundsQuery, (snapshot) => {
            contributions = [];
            snapshot.forEach((doc) => contributions.push({ id: doc.id, ...doc.data() }));
            updateUI();
        });

        // Fetch Expenses
        const expQuery = query(collection(db, "expenses"), orderBy("date", "desc"));
        onSnapshot(expQuery, (snapshot) => {
            expenses = [];
            snapshot.forEach((doc) => expenses.push({ id: doc.id, ...doc.data() }));
            updateUI();
        });
    }

    // HTML ROW BUILDERS
    function createActiveRow(item, colName) {
        const color = colName === 'funds' ? 'text-success' : 'text-danger';
        return `
            <li>
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-date">${formatDate(item.date)}</span>
                </div>
                <div>
                    <span class="item-amount ${color}">₹${item.amount.toLocaleString('en-IN')}</span>
                    <button class="delete-btn" onclick="moveToTrash('${colName}', '${item.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </li>`;
    }

    function createHistoryRow(item, colName) {
        const isFund = colName === 'funds';
        const color = isFund ? 'text-success' : 'text-danger';
        const sign = isFund ? '+' : '-';
        return `
            <li>
                <div class="item-info">
                    <span class="item-name" style="text-decoration: line-through;">${item.name}</span>
                    <span class="item-date">Orig: ${formatDate(item.date)}</span>
                </div>
                <div>
                    <span class="item-amount ${color}">${sign}₹${item.amount.toLocaleString('en-IN')}</span>
                    <button class="restore-btn" onclick="restoreItem('${colName}', '${item.id}')" title="Restore"><i class="fas fa-undo"></i></button>
                    <button class="delete-btn" onclick="permDelete('${colName}', '${item.id}')" title="Delete Forever"><i class="fas fa-times"></i></button>
                </div>
            </li>`;
    }

    function updateUI() {
        let totalFund = 0, totalExp = 0, historyCount = 0;
        
        const contList = document.getElementById('contributionList');
        const expList = document.getElementById('expenseList');
        const histList = document.getElementById('historyList');
        
        contList.innerHTML = ''; expList.innerHTML = ''; histList.innerHTML = '';

        contributions.forEach((item) => {
            if (item.status === 'deleted') {
                histList.innerHTML += createHistoryRow(item, 'funds');
                historyCount++;
            } else {
                totalFund += item.amount;
                contList.innerHTML += createActiveRow(item, 'funds');
            }
        });

        expenses.forEach((item) => {
            if (item.status === 'deleted') {
                histList.innerHTML += createHistoryRow(item, 'expenses');
                historyCount++;
            } else {
                totalExp += item.amount;
                expList.innerHTML += createActiveRow(item, 'expenses');
            }
        });

        if (historyCount === 0) histList.innerHTML = `<p style="text-align:center; color:#9ca3af; font-size:14px; margin-top:10px;">Trash is empty.</p>`;

        document.getElementById('totalCollected').innerText = `₹ ${totalFund.toLocaleString('en-IN')}`;
        document.getElementById('totalExpenses').innerText = `₹ ${totalExp.toLocaleString('en-IN')}`;
        document.getElementById('currentBalance').innerText = `₹ ${(totalFund - totalExp).toLocaleString('en-IN')}`;
    }

    // --- 5. GLOBAL TRASH FUNCTIONS ---
    window.moveToTrash = async function(colName, id) {
        if (confirm("Move this record to the trash bin?")) {
            await updateDoc(doc(db, colName, id), { status: 'deleted' });
        }
    }
    window.restoreItem = async function(colName, id) {
        await updateDoc(doc(db, colName, id), { status: 'active' });
    }
    window.permDelete = async function(colName, id) {
        if (confirm("Permanently delete this record? This cannot be undone.")) {
            await deleteDoc(doc(db, colName, id));
        }
    }
    window.emptyTrash = async function() {
        if (confirm("Empty the trash? All deleted items will be gone forever from the Cloud.")) {
            const delFunds = contributions.filter(c => c.status === 'deleted');
            const delExps = expenses.filter(e => e.status === 'deleted');
            for(let f of delFunds) await deleteDoc(doc(db, "funds", f.id));
            for(let e of delExps) await deleteDoc(doc(db, "expenses", e.id));
        }
    }

    // --- 6. ADD RECORD ---
    window.addRecord = async function(type) {
        const isFund = type === 'fund';
        const dateInput = document.getElementById(isFund ? 'fundDate' : 'expDate').value;
        const nameInput = document.getElementById(isFund ? 'memberName' : 'expenseName');
        const amountInput = document.getElementById(isFund ? 'memberAmount' : 'expenseAmount');
        
        const name = nameInput.value.trim();
        const amount = parseFloat(amountInput.value);
        const targetCollection = isFund ? "funds" : "expenses";

        if (name && amount > 0 && dateInput) {
            try {
                await addDoc(collection(db, targetCollection), {
                    name: name,
                    amount: amount,
                    date: dateInput,
                    status: 'active', // Forces it into active list
                    timestamp: new Date().getTime()
                });
                nameInput.value = '';
                amountInput.value = '';
            } catch (err) {
                console.error("Cloud Write Error: ", err);
            }
        } else {
            alert("Please fill in the Date, Name, and Amount!");
        }
    }

    document.getElementById('addFundBtn').addEventListener('click', () => window.addRecord('fund'));
    document.getElementById('addExpBtn').addEventListener('click', () => window.addRecord('exp'));

    // --- 7. DYNAMIC PDF BUILDER ---
    document.getElementById('pdfBtn').addEventListener('click', () => {
        
        // Grab what the user checked
        const incSummary = document.getElementById('pdfSummary').checked;
        const incFunds = document.getElementById('pdfFunds').checked;
        const incExps = document.getElementById('pdfExps').checked;

        if (!incSummary && !incFunds && !incExps) {
            alert("Please select at least one option (Summary, Contributions, or Expenses) to generate the PDF!");
            return;
        }

        const activeFunds = contributions.filter(c => c.status !== 'deleted');
        const activeExps = expenses.filter(e => e.status !== 'deleted');
        
        let tFund = 0; activeFunds.forEach(f => tFund += f.amount);
        let tExp = 0; activeExps.forEach(e => tExp += e.amount);

        // Check if there is actual data for the things they selected
        if (incFunds && !incExps && activeFunds.length === 0) {
            alert("There are no active contributions to print!");
            return;
        }
        if (incExps && !incFunds && activeExps.length === 0) {
            alert("There are no active expenses to print!");
            return;
        }

        const pdfContainer = document.getElementById('pdfContent');
        pdfContainer.style.display = 'block'; 
        pdfContainer.style.padding = '30px';
        pdfContainer.style.fontFamily = "Arial, sans-serif";
        
        // Base Title
        let pdfHTML = `
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color: #d35400; margin:0; font-size: 28px;">GIRDHARI GROUP FUND</h1>
                <p style="color: #666; margin-top:5px;">Report Generated: ${formatDate(localToday)}</p>
            </div>
        `;

        // 1. Add Summary if checked
        if (incSummary) {
            pdfHTML += `
            <div style="display: flex; justify-content: space-between; background: #f3f4f6; padding: 15px; border-radius: 8px; margin-bottom: 30px;">
                <div style="text-align:center;"><strong>Total Collected</strong><br><span style="color:#10b981; font-size:20px;">₹${tFund.toLocaleString('en-IN')}</span></div>
                <div style="text-align:center;"><strong>Total Expenses</strong><br><span style="color:#ef4444; font-size:20px;">₹${tExp.toLocaleString('en-IN')}</span></div>
                <div style="text-align:center;"><strong>Final Balance</strong><br><span style="color:#e67e22; font-size:20px;">₹${(tFund - tExp).toLocaleString('en-IN')}</span></div>
            </div>`;
        }

        // 2. Add Contributions if checked
        if (incFunds && activeFunds.length > 0) {
            pdfHTML += `
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 14px;">
                <thead>
                    <tr style="background: #10b981; color: white;"><th colspan="3" style="padding: 10px; text-align: left;">Contributions Log</th></tr>
                    <tr style="background: #e5e7eb; color: #333;"><th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Date</th><th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Member Name</th><th style="padding: 8px; text-align: right; border: 1px solid #ccc;">Amount</th></tr>
                </thead>
                <tbody>
                    ${activeFunds.map(c => `<tr><td style="padding: 8px; border: 1px solid #ccc;">${formatDate(c.date)}</td><td style="padding: 8px; border: 1px solid #ccc;">${c.name}</td><td style="padding: 8px; text-align: right; border: 1px solid #ccc;">₹${c.amount.toLocaleString('en-IN')}</td></tr>`).join('')}
                </tbody>
            </table>`;
        }

        // 3. Add Expenses if checked
        if (incExps && activeExps.length > 0) {
            pdfHTML += `
            <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                <thead>
                    <tr style="background: #ef4444; color: white;"><th colspan="3" style="padding: 10px; text-align: left;">Expenses Log</th></tr>
                    <tr style="background: #e5e7eb; color: #333;"><th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Date</th><th style="padding: 8px; text-align: left; border: 1px solid #ccc;">Expense Detail</th><th style="padding: 8px; text-align: right; border: 1px solid #ccc;">Amount</th></tr>
                </thead>
                <tbody>
                    ${activeExps.map(e => `<tr><td style="padding: 8px; border: 1px solid #ccc;">${formatDate(e.date)}</td><td style="padding: 8px; border: 1px solid #ccc;">${e.name}</td><td style="padding: 8px; text-align: right; border: 1px solid #ccc;">₹${e.amount.toLocaleString('en-IN')}</td></tr>`).join('')}
                </tbody>
            </table>`;
        }

        pdfContainer.innerHTML = pdfHTML;
        const opt = { margin: 0.5, filename: 'Girdhari_Group_Report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        
        // Generate PDF and hide container again
        html2pdf().set(opt).from(pdfContainer).save().then(() => { 
            pdfContainer.style.display = 'none'; 
        });
    });
</script>

</body>
</html>
